services:
  - type: web
    name: navee-stores-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://your-navee-frontend.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
