services:
  - type: web
    name: market-place-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 5000
      - key: CLIENT_URL
        value: https://your-market-place-frontend.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: MONGO_URI
        sync: false
